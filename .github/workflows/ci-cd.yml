name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, linux]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (dev)
        run: uv sync --group dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: [self-hosted, linux]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (runtime)
        run: uv sync --frozen

      - name: Restart gateway
        run: sudo systemctl restart deerflow-gateway.service

      - name: Restart agent
        run: sudo systemctl restart deerflow-agent.service

      - name: Check service status
        run: sudo systemctl --no-pager --full status deerflow-gateway.service deerflow-agent.service
